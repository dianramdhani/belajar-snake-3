<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="snakeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Snake body (curved) -->
  <path d="M 20 50 Q 30 30 50 30 Q 70 30 70 50 Q 70 70 50 70 Q 30 70 30 50" 
        fill="none" 
        stroke="url(#snakeGradient)" 
        stroke-width="12" 
        stroke-linecap="round"/>
  <!-- Snake head -->
  <circle cx="20" cy="50" r="10" fill="#22d3ee"/>
  <!-- Eyes -->
  <circle cx="17" cy="47" r="3" fill="white"/>
  <circle cx="23" cy="47" r="3" fill="white"/>
  <circle cx="17" cy="47" r="1.5" fill="black"/>
  <circle cx="23" cy="47" r="1.5" fill="black"/>
  <!-- Food (apple) -->
  <circle cx="75" cy="35" r="8" fill="#ef4444"/>
  <path d="M 75 27 Q 78 22 82 25" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round"/>
</svg>
